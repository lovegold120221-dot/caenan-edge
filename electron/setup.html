<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Caenan — Setting up</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0a;--card:#111;--border:#222;--accent:#7c3aed;
    --green:#22c55e;--red:#ef4444;--yellow:#eab308;--muted:#555;
    --text:#e5e7eb;--text2:#9ca3af;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:14px;overflow:hidden;-webkit-app-region:drag;user-select:none;}
  .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;padding:40px 32px;gap:24px;}
  .logo{width:64px;height:64px;object-fit:contain;}
  .title{font-size:20px;font-weight:600;letter-spacing:-.3px;}
  .subtitle{font-size:13px;color:var(--text2);}

  /* Step list */
  .steps{width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px;}
  .step{display:flex;align-items:center;gap:12px;padding:10px 14px;
    border-radius:8px;border:1px solid var(--border);background:var(--card);transition:border-color .2s;}
  .step.active{border-color:var(--accent);}
  .step.done{border-color:#1a3a1a;}
  .step.error{border-color:#3a1a1a;}
  .step-icon{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .step-icon .spin{display:inline-block;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .step-label{flex:1;font-size:13px;font-weight:500;}
  .step-status{font-size:11px;color:var(--text2);}

  /* Progress bar */
  .progress-wrap{width:100%;max-width:480px;}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
  .progress-label{font-size:12px;color:var(--text2);text-align:right;margin-top:6px;}

  /* Log */
  .log{width:100%;max-width:480px;height:80px;overflow-y:auto;padding:8px 10px;
    background:var(--card);border:1px solid var(--border);border-radius:6px;
    font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--text2);
    -webkit-app-region:no-drag;}
  .log-line{line-height:1.5;word-break:break-all;}

  /* Done state */
  .done-msg{font-size:13px;color:var(--green);text-align:center;}
  .error-msg{font-size:13px;color:var(--red);text-align:center;max-width:480px;line-height:1.6;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="./logo.png" alt="Caenan" id="logo" onerror="this.style.display='none'" />
  <div class="title">Caenan Local Edge</div>
  <div class="subtitle">Setting up your environment — this only runs once</div>

  <div class="steps" id="steps">
    <div class="step" id="step-system">
      <div class="step-icon" id="icon-system">◦</div>
      <div class="step-label">Checking system</div>
      <div class="step-status" id="status-system"></div>
    </div>
    <div class="step" id="step-brew">
      <div class="step-icon" id="icon-brew">◦</div>
      <div class="step-label">Homebrew <span style="font-size:11px;opacity:.5">(macOS)</span></div>
      <div class="step-status" id="status-brew"></div>
    </div>
    <div class="step" id="step-docker">
      <div class="step-icon" id="icon-docker">◦</div>
      <div class="step-label">Docker</div>
      <div class="step-status" id="status-docker"></div>
    </div>
    <div class="step" id="step-docker_start">
      <div class="step-icon" id="icon-docker_start">◦</div>
      <div class="step-label">Starting Docker daemon</div>
      <div class="step-status" id="status-docker_start"></div>
    </div>
    <div class="step" id="step-supabase_cli">
      <div class="step-icon" id="icon-supabase_cli">◦</div>
      <div class="step-label">Supabase CLI</div>
      <div class="step-status" id="status-supabase_cli"></div>
    </div>
    <div class="step" id="step-supabase_start">
      <div class="step-icon" id="icon-supabase_start">◦</div>
      <div class="step-label">Starting local database</div>
      <div class="step-status" id="status-supabase_start"></div>
    </div>
    <div class="step" id="step-ollama">
      <div class="step-icon" id="icon-ollama">◦</div>
      <div class="step-label">Ollama</div>
      <div class="step-status" id="status-ollama"></div>
    </div>
    <div class="step" id="step-model">
      <div class="step-icon" id="icon-model">◦</div>
      <div class="step-label">Pulling AI model (eburonmax/eburon-reasoner)</div>
      <div class="step-status" id="status-model"></div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 / 8</div>
  </div>

  <pre class="log" id="log"></pre>

  <div class="done-msg hidden" id="done-msg">✓ Setup complete — launching Caenan…</div>
  <div class="error-msg hidden" id="error-msg"></div>
</div>

<script>
const TOTAL = 8;
let done = 0;

function setStep(id, state, statusText) {
  const row   = document.getElementById('step-' + id);
  const icon  = document.getElementById('icon-' + id);
  const stat  = document.getElementById('status-' + id);
  if (!row) return;
  row.classList.remove('active','done','error');
  if (state === 'active') {
    row.classList.add('active');
    icon.innerHTML = '<span class="spin">⟳</span>';
  } else if (state === 'done') {
    row.classList.add('done');
    icon.innerHTML = '<span style="color:var(--green)">✓</span>';
    done++;
    updateProgress();
  } else if (state === 'error') {
    row.classList.add('error');
    icon.innerHTML = '<span style="color:var(--red)">✗</span>';
  } else if (state === 'skip') {
    row.classList.add('done');
    icon.innerHTML = '<span style="color:var(--muted)">–</span>';
    done++;
    updateProgress();
  }
  if (statusText && stat) stat.textContent = statusText;
}

function updateProgress() {
  const pct = Math.round((done / TOTAL) * 100);
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('progress-label').textContent = done + ' / ' + TOTAL;
}

function appendLog(msg) {
  if (!msg || !msg.trim()) return;
  const log = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.textContent = msg.trim();
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

window.setup.onStep((data) => {
  setStep(data.id, data.state, data.status || '');
});
window.setup.onLog((msg) => appendLog(msg));
window.setup.onComplete(() => {
  document.getElementById('done-msg').classList.remove('hidden');
  document.getElementById('progress').style.width = '100%';
  document.getElementById('progress-label').textContent = TOTAL + ' / ' + TOTAL;
});
window.setup.onError((msg) => {
  const el = document.getElementById('error-msg');
  el.textContent = '⚠ ' + msg;
  el.classList.remove('hidden');
});

// Tell main we're ready
window.setup.ready();
</script>
</body>
</html>
